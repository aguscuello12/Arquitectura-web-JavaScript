<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Diario Online - Suscripción</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <!-- Nuestro CSS -->
  <link rel="stylesheet" href="clase09.css"/>
</head>
<body>

  <!-- ── CABECERA ── -->
  <header>
    <h1>EL CRONISTA</h1>
    <p>Tu diario online de confianza</p>
  </header>

  <!-- ── BARRA DE NAVEGACIÓN ── -->
  <nav class="barra">
    <a href="#">Inicio</a>
    <a href="#">Política</a>
    <a href="#">Economía</a>
    <a href="#">Deportes</a>
    <a href="#">Suscribirse</a>
  </nav>

  <!-- ── CONTENIDO PRINCIPAL ── -->
  <main class="container my-5">

    <div id="titulo-hola">HOLA</div>

    <form id="form-suscripcion" novalidate>
      <div class="row g-4">

        <div class="col-12 col-md-6 campo" id="campo-nombre">
          <label class="form-label" for="nombre">Nombre completo</label>
          <input type="text" class="form-control" id="nombre" placeholder="Juan Pérez"/>
          <div class="invalid-feedback" id="error-nombre"></div>
        </div>

        <div class="col-12 col-md-6 campo" id="campo-email">
          <label class="form-label" for="email">Email</label>
          <input type="email" class="form-control" id="email" placeholder="juan@email.com"/>
          <div class="invalid-feedback" id="error-email"></div>
        </div>

        <div class="col-12 col-md-6 campo" id="campo-password">
          <label class="form-label" for="password">Contraseña</label>
          <input type="password" class="form-control" id="password" placeholder="Mínimo 8 caracteres"/>
          <div class="invalid-feedback" id="error-password"></div>
        </div>

        <div class="col-12 col-md-6 campo" id="campo-repetir">
          <label class="form-label" for="repetir">Repetir contraseña</label>
          <input type="password" class="form-control" id="repetir" placeholder="Repetí tu contraseña"/>
          <div class="invalid-feedback" id="error-repetir"></div>
        </div>

        <div class="col-12 col-md-6 campo" id="campo-edad">
          <label class="form-label" for="edad">Edad</label>
          <input type="number" class="form-control" id="edad" placeholder="18"/>
          <div class="invalid-feedback" id="error-edad"></div>
        </div>

        <div class="col-12 col-md-6 campo" id="campo-telefono">
          <label class="form-label" for="telefono">Teléfono</label>
          <input type="text" class="form-control" id="telefono" placeholder="1123456789"/>
          <div class="invalid-feedback" id="error-telefono"></div>
        </div>

        <div class="col-12 col-md-6 campo" id="campo-direccion">
          <label class="form-label" for="direccion">Dirección</label>
          <input type="text" class="form-control" id="direccion" placeholder="Av. Corrientes 1234"/>
          <div class="invalid-feedback" id="error-direccion"></div>
        </div>

        <div class="col-12 col-md-6 campo" id="campo-ciudad">
          <label class="form-label" for="ciudad">Ciudad</label>
          <input type="text" class="form-control" id="ciudad" placeholder="Buenos Aires"/>
          <div class="invalid-feedback" id="error-ciudad"></div>
        </div>

        <div class="col-12 col-md-6 campo" id="campo-cp">
          <label class="form-label" for="cp">Código postal</label>
          <input type="text" class="form-control" id="cp" placeholder="1414"/>
          <div class="invalid-feedback" id="error-cp"></div>
        </div>

        <div class="col-12 col-md-6 campo" id="campo-dni">
          <label class="form-label" for="dni">DNI</label>
          <input type="text" class="form-control" id="dni" placeholder="12345678"/>
          <div class="invalid-feedback" id="error-dni"></div>
        </div>

        <div class="col-12 d-flex justify-content-center mt-2">
          <button type="submit" class="btn btn-danger px-5">Enviar</button>
        </div>

      </div>
    </form>
  </main>

  <!-- ── PIE DE PÁGINA ── -->
  <footer>
    <p>© 2025 El Cronista · Todos los derechos reservados</p>
  </footer>

  <!-- Nuestro JS (al final del body) -->
  <script src="clase09.js"></script>

</body>
</html>
